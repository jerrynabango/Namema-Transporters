[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

# ============================================================
# BUILD PROCESSING
# ============================================================

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# ============================================================
# DEPLOY CONTEXTS
# ============================================================

[context.production]
  command = "npm run build"
  
  [context.production.environment]
    NODE_ENV = "production"

[context.deploy-preview]
  command = "npm run build"
  
  [context.deploy-preview.environment]
    NODE_ENV = "preview"

[context.branch-deploy]
  command = "npm run build"
  
  [context.branch-deploy.environment]
    NODE_ENV = "preview"

# ============================================================
# REDIRECTS - ORDER MATTERS!
# ============================================================

# 1. STATIC ASSETS
[[redirects]]
  from = "/_assets/*"
  to = "/_assets/:splat"
  status = 200
  force = false

[[redirects]]
  from = "/*.css"
  to = "/:splat.css"
  status = 200
  force = false

[[redirects]]
  from = "/*.js"
  to = "/:splat.js"
  status = 200
  force = false

[[redirects]]
  from = "/images/*"
  to = "/images/:splat"
  status = 200
  force = false

[[redirects]]
  from = "/*.woff"
  to = "/:splat.woff"
  status = 200
  force = false

[[redirects]]
  from = "/*.woff2"
  to = "/:splat.woff2"
  status = 200
  force = false

[[redirects]]
  from = "/*.xml"
  to = "/:splat.xml"
  status = 200
  force = false

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200
  force = false

# 2. OLD URL REDIRECTS
[[redirects]]
  from = "/old-services"
  to = "/services"
  status = 301

[[redirects]]
  from = "/old-contact"
  to = "/contact"
  status = 301

[[redirects]]
  from = "/old-quote"
  to = "/quote"
  status = 301

[[redirects]]
  from = "/old-about"
  to = "/about"
  status = 301

[[redirects]]
  from = "/old-fleet"
  to = "/fleet"
  status = 301

# 3. REMOVE TRAILING SLASHES
[[redirects]]
  from = "/services/"
  to = "/services"
  status = 301

[[redirects]]
  from = "/about/"
  to = "/about"
  status = 301

[[redirects]]
  from = "/contact/"
  to = "/contact"
  status = 301

[[redirects]]
  from = "/quote/"
  to = "/quote"
  status = 301

[[redirects]]
  from = "/fleet/"
  to = "/fleet"
  status = 301

[[redirects]]
  from = "/thank-you/"
  to = "/thank-you"
  status = 301

# 4. FORM SUCCESS
[[redirects]]
  from = "/form-success"
  to = "/thank-you"
  status = 302

# 5. FORCE HTTPS
[[redirects]]
  from = "http://*"
  to = "https://:splat"
  status = 301
  force = true

# 6. SPA FALLBACK
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# 7. 404 - MUST BE LAST
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
  force = true

# ============================================================
# SECURITY HEADERS
# ============================================================

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/*.css"
  [headers.values]
    Content-Type = "text/css"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "text/css"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
