# Netlify configuration for Namema Transporters

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

# ============================================================
# BUILD PROCESSING
# ============================================================

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# ============================================================
# DEPLOY CONTEXTS
# ============================================================

# Production environment
[context.production]
  command = "npm run build"
  
  [context.production.environment]
    NODE_ENV = "production"

# Deploy previews (pull requests)
[context.deploy-preview]
  command = "npm run build"
  
  [context.deploy-preview.environment]
    NODE_ENV = "preview"

# Branch deploys (other branches)
[context.branch-deploy]
  command = "npm run build"
  
  [context.branch-deploy.environment]
    NODE_ENV = "preview"

# ============================================================
# SECURITY HEADERS
# ============================================================

# Global security headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Cache-Control = "public, max-age=0, must-revalidate"

# Ensure CSS files have correct MIME type
[[headers]]
  for = "/*.css"
  [headers.values]
    Content-Type = "text/css"
    Cache-Control = "public, max-age=31536000, immutable"

# Ensure JS files have correct MIME type
[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript"
    Cache-Control = "public, max-age=31536000, immutable"

# ============================================================
# STATIC ASSET CACHING
# ============================================================

# Images
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Assets (bundled files from Astro build)
[[headers]]
  for = "/_assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Font files
[[headers]]
  for = "/*.woff"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ============================================================
# PAGE-SPECIFIC CACHING
# ============================================================

# HTML files - shorter cache
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Quote page - shorter cache
[[headers]]
  for = "/quote"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/quote/index.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Contact page - shorter cache
[[headers]]
  for = "/contact"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/contact/index.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Thank you page - no cache
[[headers]]
  for = "/thank-you"
  [headers.values]
    Cache-Control = "no-store, must-revalidate"

[[headers]]
  for = "/thank-you/index.html"
  [headers.values]
    Cache-Control = "no-store, must-revalidate"

# ============================================================
# XML AND TEXT FILES
# ============================================================

# XML files (sitemap)
[[headers]]
  for = "/*.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Robots.txt
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ============================================================
# SECURITY: Block access to sensitive files
# ============================================================

[[headers]]
  for = "/.env"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/.git/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/node_modules/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# ============================================================
# CUSTOM DOMAIN CONFIGURATION
# ============================================================

[[headers]]
  for = "/.well-known/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
