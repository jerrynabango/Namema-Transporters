# Netlify configuration for Namema Transporters

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

# ============================================================
# BUILD PROCESSING
# ============================================================

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# ============================================================
# DEPLOY CONTEXTS
# ============================================================

# Production environment
[context.production]
  command = "npm run build"
  
  [context.production.environment]
    NODE_ENV = "production"

# Deploy previews (pull requests)
[context.deploy-preview]
  command = "npm run build"
  
  [context.deploy-preview.environment]
    NODE_ENV = "preview"

# Branch deploys (other branches)
[context.branch-deploy]
  command = "npm run build"
  
  [context.branch-deploy.environment]
    NODE_ENV = "preview"

# ============================================================
# REDIRECTS - ORDER MATTERS!
# ============================================================

# Allow CSS files to be served normally
[[redirects]]
  from = "/*.css"
  to = ":splat.css"
  status = 200
  force = false

# Allow JS files to be served normally
[[redirects]]
  from = "/*.js"
  to = ":splat.js"
  status = 200
  force = false

# Allow assets folder files to be served normally
[[redirects]]
  from = "/_assets/*"
  to = "/_assets/:splat"
  status = 200
  force = false

# Allow images to be served normally
[[redirects]]
  from = "/images/*"
  to = "/images/:splat"
  status = 200
  force = false

# Allow font files to be served normally
[[redirects]]
  from = "/*.woff"
  to = ":splat.woff"
  status = 200
  force = false

[[redirects]]
  from = "/*.woff2"
  to = ":splat.woff2"
  status = 200
  force = false

# Allow XML files (sitemap)
[[redirects]]
  from = "/*.xml"
  to = ":splat.xml"
  status = 200
  force = false

# Allow robots.txt
[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200
  force = false

# 2. Specific old URL redirects (301 permanent)
[[redirects]]
  from = "/old-services"
  to = "/services"
  status = 301

[[redirects]]
  from = "/old-contact"
  to = "/contact"
  status = 301

[[redirects]]
  from = "/old-quote"
  to = "/quote"
  status = 301

[[redirects]]
  from = "/old-about"
  to = "/about"
  status = 301

[[redirects]]
  from = "/old-fleet"
  to = "/fleet"
  status = 301

# 3. Remove trailing slashes (SEO friendly)
[[redirects]]
  from = "/services/"
  to = "/services"
  status = 301

[[redirects]]
  from = "/about/"
  to = "/about"
  status = 301

[[redirects]]
  from = "/contact/"
  to = "/contact"
  status = 301

[[redirects]]
  from = "/quote/"
  to = "/quote"
  status = 301

[[redirects]]
  from = "/fleet/"
  to = "/fleet"
  status = 301

[[redirects]]
  from = "/thank-you/"
  to = "/thank-you"
  status = 301

# 4. Form success redirect
[[redirects]]
  from = "/form-success"
  to = "/thank-you"
  status = 302

# 5. Force HTTPS
[[redirects]]
  from = "http://*"
  to = "https://:splat"
  status = 301
  force = true

# 6. WWW to non-WWW redirect (for your custom domain)
[[redirects]]
  from = "https://www.namematransporters.co.ke/*"
  to = "https://namematransporters.co.ke/:splat"
  status = 301
  force = true

# 7. SPA FALLBACK - Only for HTML routes (NOT for static assets)
# This should come AFTER all static asset rules
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# 8. 404 ERROR HANDLING - MUST BE LAST
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
  force = true

# ============================================================
# SECURITY HEADERS
# ============================================================

# Global security headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Cache-Control = "public, max-age=0, must-revalidate"

# Ensure CSS files have correct MIME type
[[headers]]
  for = "/*.css"
  [headers.values]
    Content-Type = "text/css"
    Cache-Control = "public, max-age=31536000, immutable"

# Ensure JS files have correct MIME type
[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript"
    Cache-Control = "public, max-age=31536000, immutable"

# ============================================================
# STATIC ASSET CACHING
# ============================================================

# Images
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Assets (bundled files from Astro build)
[[headers]]
  for = "/_assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Font files
[[headers]]
  for = "/*.woff"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ============================================================
# PAGE-SPECIFIC CACHING
# ============================================================

# HTML files - shorter cache
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Quote page - shorter cache
[[headers]]
  for = "/quote"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/quote/index.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Contact page - shorter cache
[[headers]]
  for = "/contact"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/contact/index.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Thank you page - no cache
[[headers]]
  for = "/thank-you"
  [headers.values]
    Cache-Control = "no-store, must-revalidate"

[[headers]]
  for = "/thank-you/index.html"
  [headers.values]
    Cache-Control = "no-store, must-revalidate"

# ============================================================
# XML AND TEXT FILES
# ============================================================

# XML files (sitemap)
[[headers]]
  for = "/*.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Robots.txt
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ============================================================
# SECURITY: Block access to sensitive files
# ============================================================

[[headers]]
  for = "/.env"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/.git/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/node_modules/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# ============================================================
# CUSTOM DOMAIN CONFIGURATION
# ============================================================

[[headers]]
  for = "/.well-known/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
